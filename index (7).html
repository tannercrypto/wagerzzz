<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAGERZZZ — Premium Sports Betting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* =====================================================
   RESET & CSS VARIABLES
   ===================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #080810;
  --surface:      #0f0f1c;
  --card:         #141428;
  --card-hover:   #1a1a35;
  --border:       rgba(255,255,255,0.08);
  --border-light: rgba(255,255,255,0.12);

  --green:        #00f5a0;
  --green-dim:    rgba(0,245,160,0.12);
  --green-glow:   rgba(0,245,160,0.35);
  --red:          #ff3c6e;
  --red-dim:      rgba(255,60,110,0.12);
  --gold:         #ffc940;
  --blue:         #38beff;
  --purple:       #a855f7;

  --text-primary:   #ffffff;
  --text-secondary: rgba(255,255,255,0.6);
  --text-muted:     rgba(255,255,255,0.35);

  --font-display: 'Bebas Neue', sans-serif;
  --font-body:    'Rajdhani', sans-serif;
  --font-mono:    'Orbitron', monospace;

  --topbar-h: 60px;
  --tabs-h:   48px;
  --ticker-h: 40px;
  --sidebar-w: 72px;
  --betslip-bar-h: 60px;
  --radius:    8px;
  --radius-sm: 6px;
}

html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  overflow-x: hidden;
  min-height: 100vh;
}

/* =====================================================
   SCROLLBAR
   ===================================================== */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

/* =====================================================
   TOPBAR
   ===================================================== */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: rgba(8,8,16,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 16px;
  z-index: 1000;
}

.logo {
  font-family: var(--font-display);
  font-size: 2rem;
  letter-spacing: 0.04em;
  background: linear-gradient(135deg, var(--gold) 0%, var(--green) 50%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
  user-select: none;
  text-shadow: none;
}

.logo-icon {
  background: linear-gradient(135deg, var(--gold), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 1.6rem;
}

#search-bar {
  flex: 1;
  max-width: 420px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 0 16px 0 40px;
  height: 38px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
#search-bar:focus { border-color: var(--green); background: rgba(255,255,255,0.09); }
#search-bar::placeholder { color: var(--text-muted); }

.search-wrap {
  flex: 1;
  max-width: 420px;
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.4;
  pointer-events: none;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-left: auto;
}

.balance-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,201,64,0.12);
  border: 1px solid rgba(255,201,64,0.3);
  border-radius: 20px;
  padding: 6px 14px;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold);
}

.avatar-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  border: 2px solid rgba(255,255,255,0.15);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  font-weight: 700;
  color: #fff;
  transition: transform 0.15s;
}
.avatar-btn:hover { transform: scale(1.08); }

/* =====================================================
   BET TYPE TABS
   ===================================================== */
#bet-tabs {
  position: fixed;
  top: var(--topbar-h);
  left: 0; right: 0;
  height: var(--tabs-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 16px;
  z-index: 990;
  overflow-x: auto;
}
#bet-tabs::-webkit-scrollbar { height: 0; }

.tab-btn {
  flex-shrink: 0;
  height: 36px;
  padding: 0 14px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.tab-btn.active {
  background: var(--green-dim);
  border-color: rgba(0,245,160,0.3);
  color: var(--green);
}
.tab-btn.live-tab {
  color: var(--red);
  border-color: rgba(255,60,110,0.2);
  background: rgba(255,60,110,0.06);
}
.tab-btn.live-tab:hover { background: rgba(255,60,110,0.12); }

/* =====================================================
   LIVE TICKER
   ===================================================== */
#ticker {
  position: fixed;
  top: calc(var(--topbar-h) + var(--tabs-h));
  left: 0; right: 0;
  height: var(--ticker-h);
  background: rgba(255,60,110,0.08);
  border-bottom: 1px solid rgba(255,60,110,0.2);
  display: flex;
  align-items: center;
  gap: 0;
  z-index: 980;
  overflow: hidden;
}

.ticker-live-badge {
  flex-shrink: 0;
  background: var(--red);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 900;
  letter-spacing: 0.1em;
  padding: 4px 10px;
  height: 100%;
  display: flex;
  align-items: center;
  gap: 5px;
}

.ticker-dot {
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.ticker-scroll-wrap {
  flex: 1;
  overflow: hidden;
  height: 100%;
  display: flex;
  align-items: center;
}

.ticker-inner {
  display: flex;
  gap: 0;
  animation: ticker-scroll 45s linear infinite;
  white-space: nowrap;
  will-change: transform;
}

.ticker-item {
  padding: 0 28px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 400;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.04em;
  border-right: 1px solid rgba(255,60,110,0.2);
}

@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* =====================================================
   MAIN LAYOUT
   ===================================================== */
#app {
  display: flex;
  padding-top: calc(var(--topbar-h) + var(--tabs-h) + var(--ticker-h));
  padding-bottom: calc(var(--betslip-bar-h) + 20px);
  min-height: 100vh;
}

/* =====================================================
   SPORT SIDEBAR
   ===================================================== */
#sport-sidebar {
  position: sticky;
  top: calc(var(--topbar-h) + var(--tabs-h) + var(--ticker-h));
  height: calc(100vh - var(--topbar-h) - var(--tabs-h) - var(--ticker-h));
  width: var(--sidebar-w);
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 8px 0;
  scrollbar-width: none;
}
#sport-sidebar::-webkit-scrollbar { display: none; }

.sport-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: 62px;
  width: 100%;
  cursor: pointer;
  border-left: 2px solid transparent;
  border-radius: 0;
  transition: all 0.18s;
  position: relative;
  padding: 0 4px;
}
.sport-item:hover { background: rgba(255,255,255,0.04); }
.sport-item.active {
  background: var(--green-dim);
  border-left-color: var(--green);
}

.sport-icon { font-size: 1.4rem; line-height: 1; }

.sport-label {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  text-align: center;
  text-transform: uppercase;
  line-height: 1;
}
.sport-item.active .sport-label { color: var(--green); }

.sport-live-dot {
  position: absolute;
  top: 8px; right: 10px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  animation: blink 1.2s infinite;
}

/* =====================================================
   MAIN CONTENT
   ===================================================== */
#main-content {
  flex: 1;
  padding: 0;
  overflow: hidden;
}

.sport-section {
  display: none;
}
.sport-section.active {
  display: block;
}

.league-block {
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
}

.league-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}

.league-flag { font-size: 1.1rem; line-height: 1; }

.league-name {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--text-secondary);
  text-transform: uppercase;
}

.league-count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 2px 8px;
}

/* =====================================================
   GAME ROW — THE MOST IMPORTANT PART
   ===================================================== */
.game-row {
  display: flex;
  align-items: stretch;
  gap: 0;
  padding: 0;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  min-height: 90px;
  transition: background 0.15s;
  cursor: default;
}
.game-row:hover { background: var(--card-hover); }
.game-row:last-child { border-bottom: none; }

/* Time column */
.game-time-col {
  flex-shrink: 0;
  width: 58px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 8px;
  border-right: 1px solid var(--border);
}

.game-time-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.2;
}
.game-time-label.live {
  color: var(--red);
  animation: blink 1.5s infinite;
}
.game-time-label.scheduled { color: var(--text-primary); }
.game-time-label.future { color: var(--gold); font-size: 0.5rem; }

.game-period {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.2;
  letter-spacing: 0.04em;
}

/* Teams column */
.game-teams-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 10px 14px;
  gap: 6px;
  min-width: 0;
}

.team-row {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.team-logo-box {
  width: 34px;
  height: 34px;
  flex-shrink: 0;
  border-radius: 6px;
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
}
.team-logo-box img {
  width: 28px;
  height: 28px;
  object-fit: contain;
}
.team-logo-box .no-logo {
  font-size: 0.7rem;
  font-weight: 900;
  color: rgba(255,255,255,0.3);
  font-family: var(--font-mono);
}

.team-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.team-name {
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
  letter-spacing: 0.01em;
}

.team-score {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  font-weight: 900;
  flex-shrink: 0;
  min-width: 32px;
  text-align: right;
}
.team-score.winning { color: var(--green); }
.team-score.losing  { color: var(--text-muted); }
.team-score.tied    { color: var(--text-secondary); }

/* Odds buttons column */
.game-odds-col {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 10px 10px;
  border-left: 1px solid var(--border);
}

.odds-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  min-width: 68px;
  height: 58px;
  border-radius: var(--radius);
  border: 1px solid var(--border-light);
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  transition: all 0.15s;
  padding: 4px 6px;
  position: relative;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.odds-btn:hover {
  background: rgba(0,245,160,0.07);
  border-color: rgba(0,245,160,0.4);
  box-shadow: 0 0 12px rgba(0,245,160,0.15);
  transform: translateY(-1px);
}
.odds-btn:active { transform: translateY(0) scale(0.97); }

.odds-btn.selected {
  background: rgba(0,245,160,0.15);
  border-color: var(--green);
  box-shadow: 0 0 18px rgba(0,245,160,0.3), inset 0 0 8px rgba(0,245,160,0.05);
}

.odds-label {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  text-transform: uppercase;
  line-height: 1;
}
.odds-btn.selected .odds-label { color: var(--green); opacity: 0.7; }

.odds-value {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1;
  letter-spacing: 0.02em;
  text-align: center;
  white-space: nowrap;
}
.odds-btn.selected .odds-value { color: var(--green); }

.odds-price {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 700;
  line-height: 1;
  text-align: center;
}
.odds-price.pos { color: var(--green); }
.odds-price.neg { color: rgba(255,255,255,0.75); }
.odds-price.even { color: var(--blue); }

/* More markets link */
.game-more-col {
  flex-shrink: 0;
  width: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 4px;
  border-left: 1px solid var(--border);
}

.more-link {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  font-weight: 700;
  color: var(--blue);
  text-decoration: none;
  letter-spacing: 0.06em;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  cursor: pointer;
  transition: color 0.15s;
  padding: 4px 0;
}
.more-link:hover { color: var(--green); }

/* Single team (futures/golf/etc) */
.single-team-layout {
  flex-direction: row;
  align-items: center;
}

/* =====================================================
   BET SLIP
   ===================================================== */
#betslip-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--betslip-bar-h);
  background: rgba(14,14,28,0.97);
  backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 900;
  cursor: pointer;
  transition: border-color 0.2s;
}
#betslip-bar:hover { border-top-color: rgba(0,245,160,0.3); }

.betslip-bar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.bet-count-bubble {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--green);
  color: var(--bg);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s, background 0.2s;
}
.bet-count-bubble.empty { background: rgba(255,255,255,0.15); }
.bet-count-bubble.pulse { animation: pulse-pop 0.3s ease-out; }

@keyframes pulse-pop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.4); }
  100% { transform: scale(1); }
}

.betslip-bar-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  color: var(--text-primary);
}

.betslip-bar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.betslip-payout {
  text-align: right;
}
.betslip-payout-label {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.betslip-payout-amount {
  font-family: var(--font-mono);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--green);
}

.betslip-chevron {
  color: var(--text-secondary);
  transition: transform 0.3s;
  flex-shrink: 0;
}
.betslip-chevron.open { transform: rotate(180deg); }

/* =====================================================
   BET SLIP PANEL
   ===================================================== */
#betslip-panel {
  position: fixed;
  bottom: var(--betslip-bar-h);
  left: 0; right: 0;
  height: 62vh;
  background: var(--surface);
  border-top: 2px solid var(--green);
  border-radius: 16px 16px 0 0;
  z-index: 950;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 -20px 60px rgba(0,0,0,0.6);
}
#betslip-panel.open { transform: translateY(0); }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  letter-spacing: 0.08em;
  background: linear-gradient(90deg, var(--green), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.panel-meta {
  display: flex;
  align-items: center;
  gap: 12px;
}

.panel-bet-count {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  background: rgba(255,255,255,0.06);
  padding: 3px 10px;
  border-radius: 10px;
}

.close-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: all 0.15s;
}
.close-btn:hover { background: rgba(255,60,110,0.15); border-color: var(--red); color: var(--red); }

.panel-mode-tabs {
  display: flex;
  gap: 4px;
  padding: 10px 20px 0;
  flex-shrink: 0;
}

.panel-mode-tab {
  padding: 5px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.15s;
}
.panel-mode-tab:hover { color: var(--text-primary); }
.panel-mode-tab.active {
  background: var(--green-dim);
  border-color: rgba(0,245,160,0.4);
  color: var(--green);
}

.panel-bets-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 2.5rem; opacity: 0.4; }
.empty-title {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.empty-sub {
  font-family: var(--font-body);
  font-size: 0.9rem;
  color: var(--text-muted);
  opacity: 0.6;
  text-align: center;
}

.bet-slip-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  animation: slide-in 0.2s ease-out;
}

@keyframes slide-in {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.bet-slip-item-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.bet-slip-label {
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.3;
  flex: 1;
}

.bet-slip-market {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}

.bet-slip-odds-badge {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--green);
  background: var(--green-dim);
  border: 1px solid rgba(0,245,160,0.25);
  border-radius: 6px;
  padding: 4px 8px;
  white-space: nowrap;
  flex-shrink: 0;
}

.bet-slip-remove {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(255,60,110,0.1);
  border: none;
  color: rgba(255,60,110,0.6);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  flex-shrink: 0;
  transition: all 0.15s;
  margin-left: 4px;
}
.bet-slip-remove:hover { background: rgba(255,60,110,0.2); color: var(--red); }

.bet-slip-item-wager {
  display: flex;
  align-items: center;
  gap: 8px;
}

.wager-label {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  width: 36px;
  flex-shrink: 0;
}

.wager-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  font-weight: 700;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.wager-input:focus { border-color: var(--green); background: rgba(255,255,255,0.09); }

.wager-payout {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--green);
  text-align: right;
  min-width: 60px;
  flex-shrink: 0;
}
.wager-payout-label {
  font-size: 0.5rem;
  color: var(--text-muted);
  display: block;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.panel-footer {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: var(--surface);
}

.totals-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.total-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.total-value {
  font-family: var(--font-mono);
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-primary);
}
.total-value.payout { color: var(--green); }

.place-bet-btn {
  width: 100%;
  height: 46px;
  border-radius: var(--radius);
  border: none;
  background: linear-gradient(90deg, var(--green), #00c878);
  color: var(--bg);
  font-family: var(--font-display);
  font-size: 1.2rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.place-bet-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.4s;
}
.place-bet-btn:hover::before { left: 100%; }
.place-bet-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(0,245,160,0.35);
}
.place-bet-btn:active { transform: scale(0.98); }
.place-bet-btn:disabled {
  background: rgba(255,255,255,0.1);
  color: var(--text-muted);
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* =====================================================
   PARLAY MODE BANNER
   ===================================================== */
.parlay-banner {
  display: none;
  background: rgba(168,85,247,0.1);
  border: 1px solid rgba(168,85,247,0.3);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  margin: 0 0 6px;
}
.parlay-banner.visible { display: flex; align-items: center; gap: 8px; }
.parlay-odds {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--purple);
  margin-left: auto;
}
.parlay-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-secondary);
  letter-spacing: 0.08em;
}

/* =====================================================
   OVERLAY
   ===================================================== */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 940;
  display: none;
  backdrop-filter: blur(2px);
}
#overlay.visible { display: block; }

/* =====================================================
   SUCCESS TOAST
   ===================================================== */
#toast {
  position: fixed;
  bottom: calc(var(--betslip-bar-h) + 20px);
  left: 50%;
  transform: translateX(-50%) translateY(30px);
  background: var(--green);
  color: var(--bg);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 10px 24px;
  border-radius: 20px;
  z-index: 2000;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* =====================================================
   RESPONSIVE — MOBILE FIRST (≤480px phone)
   ===================================================== */

/* ── Tiny screens (iPhone SE etc) ── */
@media (max-width: 480px) {

  /* Variables */
  :root {
    --topbar-h:      50px;
    --tabs-h:        38px;
    --ticker-h:      30px;
    --sidebar-w:     42px;
    --betslip-bar-h: 50px;
  }

  /* ── TOPBAR: logo + search + balance only ── */
  #topbar { padding: 0 10px; gap: 8px; height: 50px; }
  .logo { font-size: 1.25rem; letter-spacing: 1px; flex-shrink: 0; }
  .search-wrap { flex: 1; min-width: 0; max-width: none; }
  #search-bar { height: 32px; font-size: 0.8rem; padding: 0 10px 0 32px; }
  .search-wrap svg { left: 10px; width: 12px; height: 12px; }
  .balance-badge {
    flex-shrink: 0;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 14px;
    gap: 4px;
    white-space: nowrap;
  }
  .balance-badge svg { display: none; }
  .avatar-btn { display: none; }

  /* ── TABS ── */
  #bet-tabs { padding: 0 8px; gap: 1px; height: 38px; }
  .tab-btn { padding: 0 9px; font-size: 0.55rem; letter-spacing: 0.04em; height: 30px; }

  /* ── TICKER ── */
  #ticker { height: 30px; }
  .ticker-live-badge { font-size: 0.52rem; padding: 2px 7px; gap: 4px; }
  .ticker-dot { width: 5px; height: 5px; }
  .ticker-item { font-size: 0.55rem; padding: 0 14px; }

  /* ── SIDEBAR ── */
  #sport-sidebar { width: 42px; padding: 4px 0; }
  .sport-item { height: 44px; padding: 0 2px; }
  .sport-icon { font-size: 1.05rem; }
  .sport-label { display: none; }
  .sport-live-dot { width: 5px; height: 5px; top: 4px; right: 4px; }

  /* ── APP CONTAINER ── */
  #app {
    padding-top: calc(50px + 38px + 30px) !important;
    padding-bottom: calc(50px + 52px + 16px) !important;
  }

  /* ── MAIN CONTENT ── */
  #main-content { overflow-x: hidden; width: 100%; }

  /* ── LEAGUE HEADER ── */
  .league-header { padding: 7px 8px 6px; gap: 6px; }
  .league-flag { font-size: 0.85rem; }
  .league-name { font-size: 0.52rem; letter-spacing: 0.08em; }
  .league-count { font-size: 0.46rem; padding: 1px 5px; }

  /* ══════════════════════════════════════════════
     GAME ROW — designed for 390px screen width
     Screen: 390px
     Sidebar: 42px (fixed, outside main-content)
     Remaining for game row: 348px

     Layout inside 348px:
     [42px time] [flexible teams] [52px][52px][52px odds]
     = 42 + ? + 156 = 348 → teams get 150px

     We use flex, not grid, for reliability
  ══════════════════════════════════════════════ */
  .game-row {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    min-height: 0;
    width: 100%;
    overflow: hidden;
  }

  /* TIME column — fixed 42px */
  .game-time-col {
    flex: 0 0 42px;
    width: 42px;
    min-width: 42px;
    max-width: 42px;
    padding: 4px 2px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    border-right: 1px solid var(--border);
  }
  .game-time-label {
    font-size: 0.44rem;
    font-weight: 900;
    line-height: 1.1;
    text-align: center;
    letter-spacing: 0;
  }
  .game-period {
    font-size: 0.38rem;
    line-height: 1.1;
    text-align: center;
    color: var(--text-muted);
  }

  /* TEAMS column — takes all remaining space */
  .game-teams-col {
    flex: 1 1 0;
    min-width: 0;
    max-width: calc(100% - 42px - 156px);
    padding: 5px 6px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  /* Team row inside */
  .team-row {
    display: flex;
    align-items: center;
    gap: 5px;
    min-width: 0;
    overflow: hidden;
  }

  /* Logo */
  .team-logo-box {
    flex: 0 0 22px;
    width: 22px;
    height: 22px;
    border-radius: 4px;
    background: transparent;
    border: none;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .team-logo-box svg { width: 22px; height: 22px; display: block; }

  /* Team name — MUST be visible, truncate if needed */
  .team-info { flex: 1; min-width: 0; overflow: hidden; }
  .team-name {
    font-size: 0.76rem;
    font-weight: 700;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-primary);
  }

  /* Score */
  .team-score {
    flex: 0 0 auto;
    font-size: 0.76rem;
    font-weight: 900;
    min-width: 18px;
    text-align: right;
  }

  /* ODDS column — 3 buttons × 52px = 156px total */
  .game-odds-col {
    flex: 0 0 156px;
    width: 156px;
    min-width: 156px;
    max-width: 156px;
    display: flex;
    flex-direction: row;
    padding: 0;
    gap: 0;
    border-left: none;
    align-items: stretch;
  }

  /* Each odds button exactly 52px wide */
  .odds-btn {
    flex: 0 0 52px;
    width: 52px;
    min-width: 52px;
    max-width: 52px;
    height: 100%;
    min-height: 56px;
    border-radius: 0;
    border: none;
    border-left: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 3px 1px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .odds-btn:active, .odds-btn:hover { background: rgba(0,245,160,0.07); }
  .odds-btn.selected {
    background: rgba(0,245,160,0.12);
    border-left-color: rgba(0,245,160,0.3);
  }
  .odds-btn.selected::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--green);
    border-radius: 0;
  }

  .odds-label { font-size: 0.4rem; letter-spacing: 0.03em; line-height: 1; color: var(--text-muted); }
  .odds-value { font-size: 0.62rem; font-weight: 700; line-height: 1.2; text-align: center; }
  .odds-price { font-size: 0.58rem; font-weight: 700; line-height: 1; text-align: center; }

  /* Hide +more */
  .game-more-col { display: none !important; }

  /* ── BET SLIP BAR ── */
  #betslip-bar {
    height: 50px;
    padding: 0 12px;
  }
  .bet-count-bubble { width: 24px; height: 24px; font-size: 0.7rem; }
  .betslip-bar-title { font-size: 0.7rem; letter-spacing: 0.08em; }
  .betslip-payout-label { font-size: 0.48rem; }
  .betslip-payout-amount { font-size: 0.82rem; }

  /* ── BOTTOM NAV ── */
  #bottom-nav {
    bottom: 50px !important;
    height: 52px !important;
  }
  .bn-item-ico { font-size: 1.1rem; }
  .bn-item-lbl { font-size: 0.33rem; letter-spacing: 0.5px; }
}

/* ═══ BOTTOM NAV ═══ */
#bottom-nav {
  position: fixed; bottom: 60px; left: 0; right: 0; z-index: 199;
  height: 56px;
  background: rgba(8,8,14,0.98);
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
#app { padding-bottom: calc(var(--betslip-bar-h) + 56px + 24px) !important; }
.bn-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; cursor: pointer;
  padding: 6px 0; position: relative; transition: all 0.2s;
  border: none; background: none; color: rgba(255,255,255,0.4);
}
.bn-item.active { color: var(--accent); }
.bn-item-ico { font-size: 1.3rem; line-height: 1; transition: transform 0.2s; }
.bn-item.active .bn-item-ico { transform: translateY(-2px); }
.bn-item-lbl { font-family: var(--font-ui); font-size: 0.38rem; letter-spacing: 1px; }
.bn-badge {
  position: absolute; top: 5px; right: calc(50% - 18px);
  background: var(--red); color: #fff; border-radius: 999px;
  padding: 1px 5px; font-size: 0.35rem; font-weight: 700;
  font-family: var(--font-ui); min-width: 15px; text-align: center;
  display: none;
}
/* push content up for bottom nav */
body { padding-bottom: calc(60px + 58px); }

/* ═══ OVERLAY PAGES ═══ */
.overlay-page {
  position: fixed; inset: 0; background: var(--bg);
  z-index: 195; overflow-y: auto; padding-bottom: 130px;
  transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  display: flex; flex-direction: column;
}
.overlay-page.open { transform: translateY(0); }
.op-header {
  position: sticky; top: 0; z-index: 10;
  background: rgba(10,10,18,0.97); backdrop-filter: blur(20px);
  padding: 16px 18px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; gap: 12px;
}
.op-title {
  font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 4px;
}
.op-close {
  margin-left: auto; font-size: 1rem; cursor: pointer;
  opacity: 0.4; transition: opacity 0.2s; padding: 4px 8px;
}
.op-close:hover { opacity: 1; }
.op-body { padding: 16px 18px; flex: 1; }

/* ═══ MY BETS PAGE ═══ */
.bets-filter-row { display: flex; gap: 6px; margin-bottom: 16px; }
.bf-tab {
  flex: 1; text-align: center; padding: 8px; cursor: pointer;
  font-family: var(--font-ui); font-size: 0.5rem; letter-spacing: 2px;
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  color: rgba(255,255,255,0.4); transition: all 0.2s; background: none;
}
.bf-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(0,245,160,0.06); }
.placed-bet-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 14px; margin-bottom: 10px;
}
.pbc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.pbc-sport { font-family: var(--font-ui); font-size: 0.44rem; color: var(--text-secondary); letter-spacing: 2px; }
.pbc-status {
  font-family: var(--font-ui); font-size: 0.44rem; letter-spacing: 1px;
  padding: 2px 9px; border-radius: 999px;
}
.pbc-status.pending { color: #ffc940; background: rgba(255,201,64,0.1); border: 1px solid rgba(255,201,64,0.3); }
.pbc-status.won { color: var(--accent); background: rgba(0,245,160,0.1); border: 1px solid rgba(0,245,160,0.3); }
.pbc-status.lost { color: var(--red); background: rgba(255,60,110,0.1); border: 1px solid rgba(255,60,110,0.3); }
.pbc-line { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
.pbc-bottom { display: flex; align-items: center; justify-content: space-between; }
.pbc-meta { font-family: var(--font-ui); font-size: 0.48rem; color: var(--text-secondary); }
.pbc-payout { font-family: var(--font-ui); font-size: 0.65rem; font-weight: 700; }
.pbc-payout.pos { color: var(--accent); }
.pbc-payout.neg { color: var(--red); }
.no-bets-empty { text-align: center; padding: 50px 20px; opacity: 0.4; }
.nb-ico { font-size: 3rem; }
.nb-txt { font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 2px; margin-top: 8px; }

/* ═══ LEADERBOARD PAGE ═══ */
.lb-hero {
  background: linear-gradient(135deg, rgba(168,85,247,0.12), rgba(0,245,160,0.06));
  border: 1px solid rgba(168,85,247,0.2); border-radius: 14px;

.lb-hero-title {
  font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 4px;

.lb-hero-sub { font-family: var(--font-ui); font-size: 0.5rem; color: var(--text-secondary); margin-top: 4px; letter-spacing: 2px; }
.lb-period-row { display: flex; gap: 6px; margin-bottom: 14px; }
.lb-ptab {
  flex: 1; text-align: center; padding: 8px; cursor: pointer;
  font-family: var(--font-ui); font-size: 0.48rem; letter-spacing: 1px;

  color: rgba(255,255,255,0.4); transition: all 0.2s; background: none;
}
.lb-ptab.active { color: #ffc940; border-color: #ffc940; background: rgba(255,201,64,0.06); }
.lb-row {
  display: flex; align-items: center; gap: 12px; padding: 12px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);

}
.lb-row:hover { border-color: rgba(255,255,255,0.14); }
.lb-row.me { border-color: var(--accent); background: rgba(0,245,160,0.04); }
.lb-row.me::after {

  font-family: var(--font-ui); font-size: 0.38rem; color: var(--accent); letter-spacing: 2px;
}
.lb-rank { font-family: var(--font-display); font-size: 1.5rem; width: 30px; text-align: center; flex-shrink: 0; }
.lb-rank.gold { color: #ffc940; } .lb-rank.silver { color: #c0c0c0; } .lb-rank.bronze { color: #cd7f32; }
.lb-avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
}
.lb-info { flex: 1; min-width: 0; }
.lb-name { font-size: 0.9rem; font-weight: 700; color: #fff; }

// =====================================================
// SPORT SECTIONS BUILD
// =====================================================
function getSportLeague(sportId, teamKey) {
  if (!teamKey) return null;
  return sportId;
}

function getLogoUrl(sportId, teamKey) {
  if (!teamKey) return null;
  const key = `${sportId}:${teamKey}`;
  return SVG_MAP[key] || null;
}

function buildOddsBtn(betKey, labelTxt, valTxt, priceTxt, extraLabel) {
  const isSelected = !!bets[betKey];
  const priceNum = parseInt(priceTxt.replace(/[^\d\-\+]/g, ''), 10) || 0;
  const priceClass = priceTxt.startsWith('+') ? 'pos' :
                     (priceTxt === 'EVEN' ? 'even' : 'neg');
  return `
    <button class="odds-btn ${isSelected ? 'selected' : ''}"
            data-betkey="${betKey}"
            onclick="toggleBet('${betKey}', '${escH(extraLabel || valTxt)}', '${escH(labelTxt)}', '${escH(priceTxt)}')">
      <span class="odds-label">${labelTxt}</span>
      <span class="odds-value">${valTxt}</span>
      <span class="odds-price ${priceClass}">${priceTxt}</span>
    </button>
  `;
}

function escH(s) {
  return String(s).replace(/'/g, "\\'");
}

function buildTeamRow(team, sport, isWinning, otherScore) {
  const logoUrl = team.k ? getLogoUrl(sport, team.k) : null;
  const hasScore = team.s !== null && team.s !== undefined;
  const scoreClass = hasScore
    ? (team.s > otherScore ? 'winning' : (team.s < otherScore ? 'losing' : 'tied'))
    : '';

  const logoHtml = logoUrl
    ? logoUrl  /* SVG string rendered directly */
    : `<span class="no-logo">${team.k || '?'}</span>`;

  return `
    <div class="team-row">
      <div class="team-logo-box">${logoHtml}</div>
      <div class="team-info">
        <div class="team-name">${team.n}</div>
      </div>
      ${hasScore ? `<div class="team-score ${scoreClass}">${team.s}</div>` : ''}
    </div>
  `;
}

function buildGameRow(game, sport, leagueIdx, gameIdx) {
  const isLive = game.time === 'LIVE';
  const isFuture = game.time === 'FUTURE' || game.time === 'SEASON' || game.time === 'TONIGHT';
  const teams = game.teams;
  const hasTwo = teams.length === 2;

  const timeClass = isLive ? 'live' : (isFuture ? 'future' : 'scheduled');

  // Determine winning scores
  let s0 = teams[0]?.s, s1 = teams[1]?.s;

  // Build team rows
  let teamsHtml = '';
  if (hasTwo) {
    teamsHtml = buildTeamRow(teams[0], sport, s0 > s1, s1) +
                buildTeamRow(teams[1], sport, s1 > s0, s0);
  } else {
    teamsHtml = buildTeamRow(teams[0], sport, false, null);
  }

  // Unique bet keys
  const bkSp = `${sport}-${leagueIdx}-${gameIdx}-sp`;
  const bkOu = `${sport}-${leagueIdx}-${gameIdx}-ou`;
  const bkMl = `${sport}-${leagueIdx}-${gameIdx}-ml`;

  const teamLabel = teams.map(t => t.n).join(' vs ');

  return `
    <div class="game-row">
      <div class="game-time-col">
        <div class="game-time-label ${timeClass}">${game.time}</div>
        ${game.per ? `<div class="game-period">${game.per}</div>` : ''}
      </div>
      <div class="game-teams-col">${teamsHtml}</div>
      <div class="game-odds-col">
        ${buildOddsBtn(bkSp, 'SPREAD', game.sp, game.spO, `${teamLabel} — ${game.sp} ${game.spO}`)}
        ${buildOddsBtn(bkOu, 'O/U', game.ou, game.ouO, `${teamLabel} — ${game.ou} ${game.ouO}`)}
        ${buildOddsBtn(bkMl, 'ML', game.ml, game.mlO, `${teamLabel} — ML ${game.ml} ${game.mlO}`)}
      </div>
      <div class="game-more-col">
        <span class="more-link">+12</span>
      </div>
    </div>
  `;
}

function buildMainContent() {
  const main = document.getElementById('main-content');
  main.innerHTML = SPORTS.map(sport => `
    <div class="sport-section ${sport.id === activeSport ? 'active' : ''}" id="section-${sport.id}">
      ${sport.leagues.map((league, li) => `
        <div class="league-block">
          <div class="league-header">
            <span class="league-flag">${league.flag}</span>
            <span class="league-name">${league.name}</span>
            <span class="league-count">${league.games.length} games</span>
          </div>
          ${league.games.map((game, gi) => buildGameRow(game, sport.id, li, gi)).join('')}
        </div>
      `).join('')}
    </div>
  `).join('');
}

// =====================================================
// SPORT SWITCH
// =====================================================
function setSport(id) {
  activeSport = id;

  // Update sidebar
  document.querySelectorAll('.sport-item').forEach(el => {
    el.classList.toggle('active', el.dataset.sport === id);
  });

  // Update sections
  document.querySelectorAll('.sport-section').forEach(el => {
    el.classList.toggle('active', el.id === `section-${id}`);
  });

  // Scroll main to top
  document.getElementById('main-content').scrollTop = 0;
}

// =====================================================
// TAB SWITCH
// =====================================================
function setTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTab = btn.dataset.tab;

  // Update slip mode to match
  if (activeTab === 'parlay') {
    setSlipMode('parlay');
  } else {
    setSlipMode('straight');
  }
}

// =====================================================
// BET SLIP MODE
// =====================================================
function setSlipMode(mode) {
  slipMode = mode;
  document.getElementById('mode-straight').classList.toggle('active', mode === 'straight');
  document.getElementById('mode-parlay').classList.toggle('active', mode === 'parlay');
  updateSlipUI();
}

// =====================================================
// TOGGLE BET
// =====================================================
function toggleBet(key, label, market, odds) {
  if (bets[key]) {
    // Deselect
    delete bets[key];
    // Remove selected class
    document.querySelectorAll(`[data-betkey="${key}"]`).forEach(b => b.classList.remove('selected'));
  } else {
    // Check max
    if (Object.keys(bets).length >= 12) {
      showToastMsg('MAX 12 BETS REACHED');
      return;
    }
    bets[key] = {
      label: label,
      market: market,
      odds: odds,
      wager: 10
    };
    // Add selected class
    document.querySelectorAll(`[data-betkey="${key}"]`).forEach(b => b.classList.add('selected'));
  }

  // Update counter with pulse
  updateBetCount();
  updateSlipUI();
}

function updateBetCount() {
  const count = Object.keys(bets).length;
  const bubble = document.getElementById('bet-count');
  bubble.textContent = count;
  bubble.classList.toggle('empty', count === 0);

  // Pulse animation
  bubble.classList.remove('pulse');
  void bubble.offsetWidth; // reflow
  bubble.classList.add('pulse');

  document.getElementById('panel-bet-count').textContent = `${count} bet${count !== 1 ? 's' : ''}`;
}

// =====================================================
// ODDS PARSING
// =====================================================
function parseOdds(oddsStr) {
  const clean = String(oddsStr).trim();
  const n = parseInt(clean, 10);
  if (isNaN(n)) return 1;
  if (n > 0) return (n / 100) + 1;
  if (n < 0) return (100 / Math.abs(n)) + 1;
  return 1;
}

function calcPayout(wager, oddsStr) {
  return wager * parseOdds(oddsStr);
}

function decimalToAmerican(decimal) {
  if (decimal >= 2) {
    return '+' + Math.round((decimal - 1) * 100);
  } else {
    return '-' + Math.round(100 / (decimal - 1));
  }
}

// =====================================================
// UPDATE SLIP UI
// =====================================================
function updateSlipUI() {
  const betsList = document.getElementById('bets-list');
  const emptyState = document.getElementById('empty-state');
  const footer = document.getElementById('panel-footer');
  const parlayBanner = document.getElementById('parlay-banner');

  const betEntries = Object.entries(bets);
  const hasBets = betEntries.length > 0;

  emptyState.style.display = hasBets ? 'none' : 'flex';
  footer.style.display = hasBets ? 'flex' : 'none';

  if (!hasBets) {
    betsList.innerHTML = '';
    betsList.appendChild(emptyState);
    updateBarPayout(0);
    return;
  }

  // Build bet items
  const itemsHtml = betEntries.map(([key, bet]) => {
    const payout = calcPayout(bet.wager, bet.odds);
    const priceClass = bet.odds.startsWith('+') ? 'pos' : 'neg';
    return `
      <div class="bet-slip-item" id="slip-item-${key}">
        <div class="bet-slip-item-top">
          <div>
            <div class="bet-slip-label">${bet.label}</div>
            <div class="bet-slip-market">${bet.market}</div>
          </div>
          <div class="bet-slip-odds-badge">${bet.odds}</div>
          <button class="bet-slip-remove" onclick="toggleBet('${key}', '', '', '')">✕</button>
        </div>
        <div class="bet-slip-item-wager">
          <span class="wager-label">BET</span>
          <input class="wager-input" type="number" min="1" value="${bet.wager}"
                 onchange="updateWager('${key}', this.value)"
                 oninput="updateWager('${key}', this.value)">
          <div style="text-align:right;flex-shrink:0;min-width:70px">
            <span class="wager-payout-label">PAYOUT</span>
            <div class="wager-payout" id="wager-payout-${key}">$${payout.toFixed(2)}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  betsList.innerHTML = itemsHtml;

  // Parlay display
  if (slipMode === 'parlay' && betEntries.length > 1) {
    parlayBanner.classList.add('visible');
    const combinedDecimal = betEntries.reduce((acc, [, bet]) => acc * parseOdds(bet.odds), 1);
    const american = decimalToAmerican(combinedDecimal);
    document.getElementById('parlay-odds').textContent = american;
  } else {
    parlayBanner.classList.remove('visible');
  }

  updateTotals();
}

function updateWager(key, val) {
  if (!bets[key]) return;
  const w = Math.max(1, parseFloat(val) || 1);
  bets[key].wager = w;
  const payout = calcPayout(w, bets[key].odds);
  const el = document.getElementById(`wager-payout-${key}`);
  if (el) el.textContent = `$${payout.toFixed(2)}`;
  updateTotals();
}

function updateTotals() {
  const betEntries = Object.entries(bets);
  let totalStake = 0;
  let totalPayout = 0;

  if (slipMode === 'parlay' && betEntries.length > 1) {
    const singleWager = betEntries[0]?.[1]?.wager || 10;
    totalStake = singleWager;
    const combinedDecimal = betEntries.reduce((acc, [, bet]) => acc * parseOdds(bet.odds), 1);
    totalPayout = singleWager * combinedDecimal;
  } else {
    betEntries.forEach(([, bet]) => {
      totalStake += bet.wager;
      totalPayout += calcPayout(bet.wager, bet.odds);
    });
  }

  document.getElementById('total-stake').textContent = `$${totalStake.toFixed(2)}`;
  document.getElementById('total-payout').textContent = `$${totalPayout.toFixed(2)}`;
  updateBarPayout(totalPayout);
}

function updateBarPayout(amount) {
  document.getElementById('bar-payout').textContent = `$${amount.toFixed(2)}`;
}

// =====================================================
// BET SLIP TOGGLE
// =====================================================
function toggleBetSlip() {
  slipOpen = !slipOpen;
  document.getElementById('betslip-panel').classList.toggle('open', slipOpen);
  document.getElementById('overlay').classList.toggle('visible', slipOpen);
  document.getElementById('betslip-chevron').classList.toggle('open', slipOpen);
}

// =====================================================
// PLACE BET
// =====================================================
function placeBet() {
  if (Object.keys(bets).length === 0) return;

  // Clear all bets
  bets = {};

  // Remove all selected states from odds buttons
  document.querySelectorAll('.odds-btn.selected').forEach(b => b.classList.remove('selected'));

  // Close panel
  slipOpen = false;
  document.getElementById('betslip-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('betslip-chevron').classList.remove('open');

  // Update UI
  updateBetCount();
  updateSlipUI();

  // Show toast
  showToastMsg('✓ BETS PLACED SUCCESSFULLY!');
}

function showToastMsg(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// =====================================================
// INIT
// =====================================================
function init() {
  initTicker();
  buildSidebar();
  buildMainContent();
  updateSlipUI();
}

document.addEventListener('DOMContentLoaded', init);

function bnNav(page) {
  // Close any open slip
  if (slipOpen) toggleBetSlip();
  currentPage = page;
  document.querySelectorAll('.bn-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  document.querySelectorAll('.overlay-page').forEach(p => p.classList.remove('open'));
  if (page !== 'home') {
    const el = document.getElementById('page-' + page);
    if (el) el.classList.add('open');
    if (page === 'mybets') renderMyBets();
    if (page === 'leaders') renderLB();
  }
}

function bfTab(btn, filter) {
  document.querySelectorAll('.bf-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); bfFilter = filter; renderMyBets();
}

function renderMyBets() {
  const list = document.getElementById('mybets-list');
  let data = placedBets;
  if (bfFilter === 'active') data = placedBets.filter(b => b.status === 'pending');
  else if (bfFilter === 'settled') data = placedBets.filter(b => b.status !== 'pending');
  else data = [];
  if (!data.length) {
    list.innerHTML = '<div class="no-bets-empty"><div class="nb-ico">🎟️</div><div class="nb-txt">NO BETS HERE</div></div>';
    return;
  }
  list.innerHTML = data.map(b => `
    <div class="placed-bet-card">
      <div class="pbc-top">
        <span class="pbc-sport">${b.sport} · ${b.time}</span>
        <span class="pbc-status ${b.status}">${b.status.toUpperCase()}</span>
      </div>
      <div class="pbc-line">${b.line}</div>
      <div class="pbc-bottom">
        <span class="pbc-meta">STAKE: $${b.stake} · ${b.price}</span>
        <span class="pbc-payout ${b.status==='won'?'pos':b.status==='lost'?'neg':''}">
          ${b.status==='won'?'+$'+b.payout:b.status==='lost'?'-$'+b.stake:'TO WIN $'+b.payout}
        </span>
      </div>
    </div>`).join('');
}

function lbPeriod(btn, period) {
  document.querySelectorAll('.lb-ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); lbFilter = period; renderLB();
}

function renderLB() {
  const data = LB_DATA[lbFilter] || LB_DATA['WEEKLY'];
  const rankDisp = r => r===1?'🥇':r===2?'🥈':r===3?'🥉':r;
  const rankCls = r => r===1?'gold':r===2?'silver':r===3?'bronze':'';
  document.getElementById('lb-list').innerHTML = data.map(p => `
    <div class="lb-row${p.me?' me':''}">
      <div class="lb-rank ${rankCls(p.rank)}">${rankDisp(p.rank)}</div>
      <div class="lb-avatar">${p.av}</div>
      <div class="lb-info">
        <div class="lb-name">${p.n}</div>
        <div class="lb-stats">${p.loc} · ${p.bets} BETS · ${p.wr}% WIN</div>
      </div>
      <div class="lb-profit pos">+$${p.profit.toLocaleString()}</div>
    </div>`).join('');
}

// ═══ APPLE PAY ═══
function openApplePay() {
  document.getElementById('ap-form-view').style.display = 'block';
  document.getElementById('ap-success-view').classList.remove('on');
  document.getElementById('ap-modal-overlay').classList.add('open');
}
function closeApplePay() {
  document.getElementById('ap-modal-overlay').classList.remove('open');
}
function setApAmt(amt) {
  apDepositAmt = amt;
  document.getElementById('ap-amount-display').textContent = '$' + amt + '.00';
  document.getElementById('ap-new-bal').textContent = '$' + (userBalance + amt).toLocaleString() + '.00';
  document.querySelectorAll('.ap-preset').forEach(b => b.classList.toggle('on', b.textContent === '$'+amt || b.textContent === '$'+(amt>=1000?(amt/1000)+'k':amt)));
}
function processApPay() {
  const btn = document.querySelector('.ap-pay-btn');
  btn.textContent = 'Authenticating...'; btn.style.opacity = '0.6';
  setTimeout(() => {
    btn.textContent = 'Processing...';
    setTimeout(() => {
      userBalance += apDepositAmt;
      document.getElementById('p-balance').textContent = '$' + userBalance.toLocaleString() + '.00';
      document.getElementById('ap-form-view').style.display = 'none';
      document.getElementById('ap-success-view').classList.add('on');
      document.getElementById('ap-success-msg').textContent = '$' + apDepositAmt + '.00 ADDED TO YOUR ACCOUNT';
      btn.textContent = '\u{63743} Pay'; btn.style.opacity = '1';
      showToastMsg('✅ $' + apDepositAmt + ' DEPOSITED VIA APPLE PAY');
    }, 800);
  }, 1000);
}

// Patch placeBet to also track in placedBets
const _origPlaceBet = placeBet;
function placeBet() {
  // capture current bets before clearing
  Object.values(bets).forEach(b => {
    placedBets.unshift({
      sport: 'MULTI', line: b.label, price: b.odds,
      stake: 100, payout: Math.round(100 * 1.9), status: 'pending', time: 'Just now'
    });
  });
  document.getElementById('p-bets').textContent = placedBets.filter(b=>b.status==='pending').length + 47;
  const badge = document.getElementById('mybets-badge');
  const pendingCount = placedBets.filter(b=>b.status==='pending').length;
  badge.textContent = pendingCount;
  badge.style.display = pendingCount > 0 ? 'block' : 'none';
  _origPlaceBet();
}

document.getElementById('ap-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeApplePay();
});

// Init LB on load
renderLB();

</script>

<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  var scrollRaf=0;
  function emitScroll(){
    scrollRaf=0;
    var x=window.scrollX||window.pageXOffset||0;
    var y=window.scrollY||window.pageYOffset||0;
    window.parent.postMessage({type:'INLINE_EDIT_SCROLL',scrollX:x,scrollY:y},'*');
  }
  window.addEventListener('scroll',function(){
    if(scrollRaf)return;
    scrollRaf=requestAnimationFrame(emitScroll);
  },{passive:true,capture:true});
  emitScroll();
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
